<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basquete login</title>
    <link rel="stylesheet" href="estilos/global.css">
    <link rel="stylesheet" href="estilos/login.css">

</head>

<body>

    <section class="screen">
        <div class="home-content">
            <h1 class="logo">Acesse sua conta</h1>
            <form id="login-form" class="menu">
                <input type="email" id="email" placeholder="adicione seu email aqui">

                <input type="password" id="password" placeholder="coloque sua senha">

                <div class="flex-row">
                    <div id="remember-box">
                        <!-- Checkbox para lembrar o email do usuário -->
                        <input type="checkbox" id="remember">
                        <label for="remember">Lembrar-me</label>
                    </div>
                    <!-- id="btn-esqueceu" para o login.js encontrar esse elemento -->
                    <span class="span" id="btn-esqueceu">Esqueceu sua senha?</span>
                </div>

                <!-- Mensagem de erro exibida quando login falha -->
                <div id="msg-erro"></div>

                <!-- id="btn-entrar" para o login.js vincular o evento de clique -->
                <button type="button" class="button-submit" id="btn-entrar">
                    ENTRAR
                </button>
                <p class="p">Não possui uma conta?
                    <a href="cadastro.html"><span class="span">Cadastre-se</span></a>
                </p>

            </form>
        </div>

        <div class="social-login">
            <p>Ou entre com:</p>
            <div class="social-grid">
                <!-- id="btn-google" para o login.js vincular o evento de clique -->
                <button class="btn-google" id="btn-google">
                    <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" alt="Google">
                </button>
            </div>
        </div>

    </section>


<!-- type="module" carrega o script como ES Module (suporta import/export)
     e é adiado automaticamente — só roda depois que o HTML estiver pronto -->
<script type="module" src="scripts/login.js"></script>

</body>

</html>
