<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basquete login</title>
    <link rel="stylesheet" href="estilos/global.css">
    <link rel="stylesheet" href="estilos/login.css">

</head>

<body>

    <section class="screen">
        <div class="home-content">
            <h1 class="logo">Acesse sua conta</h1>
            <form id="login-form" class="menu">
                <input type="email" id="email" placeholder="adicione seu email aqui">

                <div class="senha-wrapper">
                    <input type="password" id="password" placeholder="coloque sua senha">
                    <button type="button" id="btn-toggle-senha" class="btn-toggle-senha" aria-label="Mostrar senha">
                        <!-- Olho aberto — visível quando senha está oculta -->
                        <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <!-- Olho com barra — visível quando senha está aparecendo -->
                        <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>

                <div class="flex-row">
                    <div id="remember-box">
                        <!-- Checkbox para lembrar o email do usuário -->
                        <input type="checkbox" id="remember">
                        <label for="remember">Lembrar-me</label>
                    </div>
                    <!-- id="btn-esqueceu" para o login.js encontrar esse elemento -->
                    <span class="span" id="btn-esqueceu">Esqueceu sua senha?</span>
                </div>

                <!-- Mensagem de erro exibida quando login falha -->
                <div id="msg-erro"></div>

                <!-- id="btn-entrar" para o login.js vincular o evento de clique -->
                <button type="button" class="button-submit" id="btn-entrar">
                    ENTRAR
                </button>
                <p class="p">Não possui uma conta?
                    <a href="cadastro.html"><span class="span">Cadastre-se</span></a>
                </p>

            </form>
        </div>

    </section>


<!-- type="module" carrega o script como ES Module (suporta import/export)
     e é adiado automaticamente — só roda depois que o HTML estiver pronto -->
<script type="module" src="scripts/login.js"></script>

</body>

</html>
