<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha — Liga Grajauense</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1C62EB">
    <link rel="stylesheet" href="estilos/global.css">
    <link rel="stylesheet" href="estilos/login.css">
    <link rel="stylesheet" href="estilos/password.css">
</head>

<body>

    <section class="screen">
        <div class="home-content">

            <!-- ── Estado 1: verificando o link (carregamento inicial) ── -->
            <div id="estado-verificando" class="estado-redefinicao">
                <h1 class="logo">Verificando link...</h1>
                <p class="texto-aux">Aguarde um instante.</p>
            </div>

            <!-- ── Estado 2: formulário de nova senha ── -->
            <div id="estado-formulario" class="estado-redefinicao oculto">
                <h1 class="logo">Nova senha</h1>
                <p class="texto-aux" id="email-da-conta"></p>

                <form id="form-redefinir" class="menu">
                    <div class="senha-wrapper">
                        <input type="password" id="nova-senha" placeholder="Digite a nova senha" minlength="6" required>
                        <button type="button" id="btn-toggle-nova" class="btn-toggle-senha" aria-label="Mostrar senha">
                            <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>

                    <div class="senha-wrapper">
                        <input type="password" id="confirmar-senha" placeholder="Confirme a nova senha" minlength="6" required>
                        <button type="button" id="btn-toggle-confirmar" class="btn-toggle-senha" aria-label="Mostrar senha">
                            <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>

                    <!-- Indicador de força da senha -->
                    <div id="forca-senha" class="forca-senha oculto">
                        <div class="forca-barra"><div id="forca-barra-fill" class="forca-barra-fill"></div></div>
                        <span id="forca-label" class="forca-label"></span>
                    </div>

                    <div id="msg-erro"></div>

                    <button type="submit" class="button-submit" id="btn-salvar-nova-senha">
                        SALVAR NOVA SENHA
                    </button>
                </form>
            </div>

            <!-- ── Estado 3: sucesso ── -->
            <div id="estado-sucesso" class="estado-redefinicao oculto">
                <div class="icone-sucesso">✓</div>
                <h1 class="logo">Senha alterada!</h1>
                <p class="texto-aux">Sua senha foi redefinida com sucesso.</p>
                <a href="index.html" class="button-submit btn-link-centro">IR PARA O LOGIN</a>
            </div>

            <!-- ── Estado 4: link inválido/expirado ── -->
            <div id="estado-invalido" class="estado-redefinicao oculto">
                <div class="icone-erro">✕</div>
                <h1 class="logo">Link inválido</h1>
                <p class="texto-aux" id="msg-invalido">Este link de redefinição expirou ou já foi utilizado.</p>
                <a href="index.html" class="button-submit btn-link-centro">VOLTAR AO LOGIN</a>
            </div>

        </div>
    </section>

    <script type="module" src="scripts/password.js"></script>
    <script src="scripts/pwa.js" defer></script>

</body>

</html>
