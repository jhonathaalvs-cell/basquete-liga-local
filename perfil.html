<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
    <link rel="stylesheet" href="estilos/global.css">
    <link rel="stylesheet" href="estilos/perfil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
    <!-- ════════════════════════════════════════════════════
         MODO VISUALIZAÇÃO — estilo Instagram (padrão)
         Fica visível enquanto o usuário não clica em "Editar"
    ════════════════════════════════════════════════════ -->
    <section id="secao-view" class="perfil-container">

        <!-- Foto de perfil circular -->
        <div class="foto-wrapper">
            <img id="view-foto" src="imagens/icone.png" alt="Foto de perfil" class="foto-perfil">
        </div>

        <!-- Nome e e-mail -->
        <h2 id="view-nome" class="view-nome">Carregando...</h2>
        <p  id="view-nome-completo" class="view-nome-completo"></p>
        <p  id="view-email" class="view-email"></p>

        <!-- Badge de posição -->
        <span id="view-posicao" class="badge-posicao">—</span>

        <!-- Bio -->
        <p id="view-bio" class="view-bio">Nenhuma bio ainda.</p>

        <!-- Redes sociais -->
        <div id="view-redes" class="view-redes"></div>

        <!-- Ações -->
        <div class="view-acoes">
            <button id="btn-editar" class="btn-editar">Editar Perfil</button>
            <button id="btn-sair"   class="btn-sair">Sair</button>
        </div>

    </section>

    <!-- ════════════════════════════════════════════════════
         MODO EDIÇÃO — formulário (oculto por padrão)
         Aparece quando o usuário clica em "Editar Perfil"
    ════════════════════════════════════════════════════ -->
    <section id="secao-edit" class="perfil-container oculto">

        <!-- Foto clicável para trocar -->
        <!-- O clique é no div wrapper (id="foto-edit-wrapper") para capturar
             tanto o clique na foto quanto no overlay da câmera -->
        <div class="foto-wrapper editavel" id="foto-edit-wrapper">
            <img id="edit-foto-btn" src="imagens/icone.png" alt="Trocar foto" class="foto-perfil">
            <!-- pointer-events: none no overlay evita que ele bloqueie o clique -->
            <div class="overlay-camera">📷</div>
        </div>
        <!-- Input file oculto, acionado pelo clique no wrapper -->
        <input type="file" id="input-foto" accept="image/*" style="display:none">

        <!-- Apelido -->
        <div class="campo-edit">
            <label for="edit-nome">Apelido</label>
            <input type="text" id="edit-nome" class="input-edit" placeholder="Seu apelido na quadra">
        </div>

        <!-- Nome Completo -->
        <div class="campo-edit">
            <label for="edit-nome-completo">Nome Completo</label>
            <input type="text" id="edit-nome-completo" class="input-edit" placeholder="Seu nome completo">
        </div>

        <!-- Bio -->
        <div class="campo-edit">
            <label for="edit-bio">Bio</label>
            <textarea id="edit-bio" class="input-edit textarea-edit" placeholder="Fale um pouco sobre você..."></textarea>
        </div>

        <!-- Posição -->
        <div class="campo-edit">
            <label for="edit-posicao">Posição</label>
            <select id="edit-posicao" class="input-edit select-edit">
                <option value="Armador (PG)">Armador (PG)</option>
                <option value="Ala-Armador (SG)">Ala-Armador (SG)</option>
                <option value="Ala (SF)">Ala (SF)</option>
                <option value="Ala-Pivô (PF)">Ala-Pivô (PF)</option>
                <option value="Pivô (C)">Pivô (C)</option>
            </select>
        </div>

        <!-- Data de Nascimento -->
        <div class="campo-edit">
            <label for="edit-nascimento">Data de Nascimento</label>
            <input type="date" id="edit-nascimento" class="input-edit">
        </div>

        <!-- Redes Sociais -->
        <div class="campo-edit">
            <label>Redes Sociais</label>
            <div class="redes-edit-lista">

                <div class="rede-edit-item">
                    <span class="rede-label rede-instagram"><i class="fa-brands fa-instagram"></i> Instagram</span>
                    <input type="text" id="edit-instagram" class="input-edit input-rede" placeholder="seu_usuario">
                </div>

                <div class="rede-edit-item">
                    <span class="rede-label rede-tiktok"><i class="fa-brands fa-tiktok"></i> TikTok</span>
                    <input type="text" id="edit-tiktok" class="input-edit input-rede" placeholder="seu_usuario">
                </div>

                <div class="rede-edit-item">
                    <span class="rede-label rede-twitter"><i class="fa-brands fa-x-twitter"></i> Twitter/X</span>
                    <input type="text" id="edit-twitter" class="input-edit input-rede" placeholder="seu_usuario">
                </div>

                <div class="rede-edit-item">
                    <span class="rede-label rede-youtube"><i class="fa-brands fa-youtube"></i> YouTube</span>
                    <input type="text" id="edit-youtube" class="input-edit input-rede" placeholder="seu_canal">
                </div>

            </div>
        </div>

        <!-- Ações -->
        <div class="edit-acoes">
            <button id="btn-salvar"   class="btn-salvar">Salvar</button>
            <button id="btn-cancelar" class="btn-cancelar">Cancelar</button>
        </div>

    </section>

    <!-- Mensagem de feedback FORA das seções para aparecer em ambos os modos -->
    <div id="msg-feedback" class="msg-feedback"></div>

    <nav class="nav-bar-bottom">
        <a href="hub.html" class="link-bottom">HUB</a>
        <a href="liga.html" class="link-bottom">LIGA</a>
        <a href="jogadores.html" class="link-bottom"> JOGADORES</a>
        <a href="perfil.html" class="link-bottom ativo"> PERFIL</a>
    </nav>

    <script type="module" src="scripts/perfil.js"></script>

</body>

</html>
