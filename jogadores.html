<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogadores</title>
    <link rel="shortcut icon" href="imagens/favicon.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1C62EB">
    <link rel="stylesheet" href="estilos/global.css">
    <link rel="stylesheet" href="estilos/jogadores.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="logo-area">
            <img src="imagens/logo-liga.png" alt="icone" class="logo-app">
        </div>
    </header>

    <nav class="nav-bar">
        <a href="hub.html" class="link">HUB</a>
        <a href="liga.html" class="link">LIGA</a>
        <a href="jogadores.html" class="link ativo">JOGADORES</a>
        <a href="perfil.html" class="link">PERFIL</a>
    </nav>

    <main class="jog-container">

        <div id="tela-loading" class="jog-loading">Carregando jogadores...</div>

        <!-- Filtro por liga -->
        <div id="filtros" class="jog-filtros oculto">
            <select id="select-liga" class="jog-select">
                <option value="">Todas as ligas</option>
            </select>
        </div>

        <!-- Lista de cards -->
        <div id="lista-jogadores" class="jog-lista"></div>

    </main>

    <!-- ════════════════════════════════════
         MODAL RÁPIDO DO JOGADOR
         Abre ao clicar em um card na lista (fora dos chips de
         redes e do botão de mostrar/esconder bio)
    ════════════════════════════════════ -->
    <div id="modal-jogador" class="modal-overlay oculto">
        <div class="modal-caixa modal-caixa-pequena">
            <div class="modal-header">
                <h3 class="modal-titulo">Jogador</h3>
                <button id="btn-fechar-jogador" class="btn-fechar-modal" aria-label="Fechar">✕</button>
            </div>
            <div class="modal-corpo mj-corpo">
                <div id="mj-avatar" class="mj-avatar"></div>
                <div id="mj-nome" class="mj-nome"></div>
                <div class="mj-time">
                    <span id="mj-time-dot" class="mj-time-dot"></span>
                    <span id="mj-time-nome"></span>
                </div>
                <span id="mj-pos" class="mj-pos oculto"></span>

                <div id="mj-stats-grid" class="mj-stats-grid"></div>

                <a id="mj-btn-perfil" class="mj-btn-perfil" href="#">Ver perfil completo →</a>
            </div>
        </div>
    </div>

    <script type="module" src="scripts/jogadores.js"></script>
    <script src="scripts/pwa.js" defer></script>
</body>
</html>
